[project]
name = "actuarial-genai-rag"
version = "0.1.0"
description = "RAG system applied to the actuarial sector"
requires-python = ">=3.11"
dependencies = [
    # LLM & embeddings
    "anthropic>=0.40.0",
    "openai>=1.0.0",
    # Vector store & RAG
    "chromadb>=0.5.0",
    "langchain>=0.3.0",
    "langchain-community>=0.3.0",
    # Document processing
    "pypdf>=4.0.0",
    "python-docx>=1.1.0",
    "openpyxl>=3.1.0",
    # Data & EDA
    "pandas>=2.2.0",
    "numpy>=1.26.0",
    "matplotlib>=3.9.0",
    "seaborn>=0.13.0",
    # Notebooks
    "jupyter>=1.1.0",
    "ipykernel>=6.29.0",
    # Utilities
    "python-dotenv>=1.0.0",
    "pydantic>=2.7.0",
    "rich>=13.0.0",
    "tqdm>=4.66.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

